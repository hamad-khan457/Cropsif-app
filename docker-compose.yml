services:

  # ── PostgreSQL database ──────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cropsify_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       cropsify
      POSTGRES_USER:     cropsify_user
      POSTGRES_PASSWORD: cropsify_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cropsify_user -d cropsify"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Node.js backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cropsify_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      ML_URL:   http://ml:8000        # ✅ points to ML container
      PORT:     5000

      # Database
      DB_HOST:     postgres
      DB_PORT:     5432
      DB_NAME:     cropsify
      DB_USER:     cropsify_user
      DB_PASSWORD: cropsify_pass

      # JWT
      JWT_ACCESS_SECRET:  dev_access_secret_change_in_prod
      JWT_REFRESH_SECRET: dev_refresh_secret_change_in_prod
      JWT_ACCESS_EXPIRES:  15m
      JWT_REFRESH_EXPIRES: 7d

      # OTP & security
      OTP_EXPIRES_MINUTES:   3
      MAX_OTP_RESENDS:       3
      MAX_FAILED_ATTEMPTS:   5
      LOCK_DURATION_MINUTES: 15

      # Email
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: hk5028203@gmail.com
      SMTP_PASS: "ujsa brul gpar srdj"
      EMAIL_FROM: "Cropsify <hk5028203@gmail.com>"

    depends_on:
      postgres:
        condition: service_healthy
      ml:
        condition: service_healthy

  # ── React admin panel (nginx) ────────────────────────────────────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
    container_name: cropsify_web
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

  # ── ML service (Python / FastAPI) ────────────────────────────────────────────
  ml:
    build:
      context: ./ml
      dockerfile: Dockerfile
    container_name: cropsify_ml
    restart: unless-stopped
    ports:
      - "8000:8000"
    healthcheck:
      # Waits until FastAPI /health endpoint responds (model fully loaded)
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 90s   # EfficientNet-B3 can take up to 60-90s to load

volumes:
  pgdata:
    driver: local