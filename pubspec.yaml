name: cropsify
description: Intelligent Farm Management System — Module 1
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Map (flutter_map)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1         # one version only

  # Networking
  http: ^1.2.1

  # Secure token storage
  flutter_secure_storage: ^10.1.0

  # State management
  provider: ^6.1.2

  # Navigation
  go_router: ^15.1.2

  # Local persistence (non-sensitive)
  shared_preferences: ^2.2.3

  # OTP pin input
  pin_code_fields: ^8.0.1

  # Google Maps
  google_maps_flutter: ^2.9.0

  # Device location
  geolocator: ^13.0.0

  # Camera / Gallery picker
  image_picker: ^1.1.2

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true