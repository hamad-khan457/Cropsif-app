allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

// Inject flutter SDK integers into every library subproject BEFORE its
// build.gradle is evaluated, so references like
//   compileSdkVersion flutter.compileSdkVersion
// in plugin build scripts (e.g. geolocator_android) resolve correctly.
//
// We deliberately skip the root project and the :app module — the root
// doesn't need it, and :app gets these values from the real FlutterExtension
// registered by dev.flutter.flutter-gradle-plugin (which takes priority over
// an ext property anyway, but skipping avoids any ambiguity).
gradle.beforeProject { proj ->
    if (proj.parent != null && proj.name != 'app') {
        proj.ext.flutter = [
            compileSdkVersion : 34,
            minSdkVersion     : 21,
            targetSdkVersion  : 34,
        ]
    }
}

rootProject.buildDir = "../build"
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(":app")
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
